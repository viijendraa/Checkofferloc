<!DOCTYPE html>
<html>
<head>
  <title>Check My Offers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .card {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      margin-top: 10px;
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .success {
      color: #28a745;
      background: #d4edda;
    }
    
    .error {
      color: #dc3545;
      background: #f8d7da;
    }
    
    .info {
      color: #0c5460;
      background: #d1ecf1;
    }
    
    .hidden {
      display: none !important;
    }
    
    .location-details {
      background: #f0f8ff;
      padding: 15px;
      border-left: 5px solid #667eea;
      margin: 10px 0;
      text-align: left;
      border-radius: 5px;
    }
    
    .location-details p {
      margin: 8px 0;
      color: #333;
    }
    
    .location-details strong {
      color: #667eea;
    }
    
    .locations-list {
      margin-top: 30px;
      text-align: left;
    }
    
    .locations-list h3 {
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    
    .location-item {
      background: #f9f9f9;
      padding: 15px;
      margin: 15px 0;
      border-left: 4px solid #667eea;
      border-radius: 3px;
    }
    
    .location-item p {
      margin: 5px 0;
      color: #555;
      font-size: 14px;
    }
    
    .location-item strong {
      color: #667eea;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .button-group button {
      flex: 1;
      min-width: 150px;
      margin: 0;
    }
    
    .btn-secondary {
      background: #6c757d;
    }
    
    .btn-secondary:hover {
      background: #5a6268;
    }
    
    .btn-close {
      background: #dc3545;
      flex: 0 1 auto;
      min-width: 100px;
    }
    
    .btn-close:hover {
      background: #c82333;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #result {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- MAIN APP SECTION -->
      <div id="appSection">
        <h1>📍 Check My Offers</h1>
        <div id="result"></div>
        
        <button onclick="getLocation()" id="locationBtn">Check My Offers</button>
        <div class="button-group">
          <button class="btn-secondary" onclick="showLoginForLocations()" id="viewBtn">View Saved Locations</button>
        </div>
        
        <div class="locations-list" id="locationsList" style="display:none;"></div>
      </div>
      
      <!-- LOGIN MODAL SECTION (Hidden by default) -->
      <div id="loginSection" class="hidden">
        <h1>🔒 Login</h1>
        <div id="loginMessage"></div>
        
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" placeholder="Enter username">
        </div>
        
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" placeholder="Enter password">
        </div>
        
        <button onclick="login()" id="loginBtn">Login</button>
        <button class="btn-close" onclick="closeLogin()">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Get the base URL dynamically
    const getApiUrl = () => {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return 'http://localhost:3000';
      }
      return window.location.origin;
    };

    const API_URL = getApiUrl();
    let authToken = localStorage.getItem('authToken');

    // Show login modal
    function showLoginForLocations() {
      document.getElementById('appSection').classList.add('hidden');
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('loginMessage').innerHTML = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('username').focus();
    }

    // Close login modal
    function closeLogin() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
    }

    // Login function
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginMessage = document.getElementById('loginMessage');

      if (!username || !password) {
        loginMessage.innerHTML = '<div class="message error">Please enter username and password</div>';
        return;
      }

      loginBtn.disabled = true;
      loginMessage.innerHTML = '<div class="message info">⏳ Logging in...</div>';

      fetch(`${API_URL}/api/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      })
      .then(response => response.json())
      .then(data => {
        loginBtn.disabled = false;
        
        if (data.success) {
          authToken = data.token;
          localStorage.setItem('authToken', authToken);
          loginMessage.innerHTML = '<div class="message success">✓ Login successful!</div>';
          setTimeout(() => {
            closeLogin();
            viewLocations();
          }, 500);
        } else {
          loginMessage.innerHTML = `<div class="message error">✗ ${data.message}</div>`;
        }
      })
      .catch(error => {
        loginBtn.disabled = false;
        loginMessage.innerHTML = `<div class="message error">✗ Error: ${error.message}</div>`;
      });
    }

    // Logout function
    function logout() {
      fetch(`${API_URL}/api/logout`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${authToken}`
        }
      })
      .then(response => response.json())
      .then(data => {
        authToken = null;
        localStorage.removeItem('authToken');
        document.getElementById('locationsList').innerHTML = '';
        document.getElementById('locationsList').style.display = 'none';
      })
      .catch(err => {
        authToken = null;
        localStorage.removeItem('authToken');
        document.getElementById('locationsList').innerHTML = '';
        document.getElementById('locationsList').style.display = 'none';
      });
    }

    // Reverse geocoding function
    async function getAddressFromCoordinates(latitude, longitude) {
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`;
        
        const response = await fetch(url, {
          headers: {
            'User-Agent': 'CheckofferlocApp'
          }
        });
        
        if (!response.ok) {
          throw new Error('Geocoding service unavailable');
        }
        
        const data = await response.json();
        
        return {
          fullAddress: data.display_name || 'Address not found',
          city: data.address?.city || data.address?.town || 'N/A',
          state: data.address?.state || 'N/A',
          country: data.address?.country || 'N/A',
          postcode: data.address?.postcode || 'N/A',
          road: data.address?.road || 'N/A'
        };
      } catch (error) {
        console.error('Geocoding error:', error);
        return {
          fullAddress: 'Address lookup failed',
          city: 'N/A',
          state: 'N/A',
          country: 'N/A',
          postcode: 'N/A',
          road: 'N/A'
        };
      }
    }

    // Get location
    function getLocation() {
      const resultDiv = document.getElementById("result");
      const btn = document.getElementById("locationBtn");
      
      btn.disabled = true;
      resultDiv.innerHTML = '<div class="message info">⏳ Requesting location access...</div>';
      
      navigator.geolocation.getCurrentPosition(
        async function(pos) {
          const latitude = pos.coords.latitude;
          const longitude = pos.coords.longitude;
          const timestamp = new Date().toISOString();
          
          resultDiv.innerHTML = `
            <div class="message success">✓ Location captured successfully!</div>
            <div class="location-details">
              <p><strong>Latitude:</strong> ${latitude.toFixed(6)}</p>
              <p><strong>Longitude:</strong> ${longitude.toFixed(6)}</p>
              <p><strong>Timestamp:</strong> ${new Date(timestamp).toLocaleString()}</p>
            </div>
            <div class="message info">🔍 <span class="loading"></span> Getting exact address...</div>
          `;
          
          // Get address from coordinates
          const addressData = await getAddressFromCoordinates(latitude, longitude);
          
          resultDiv.innerHTML = `
            <div class="message success">✓ Location captured successfully!</div>
            <div class="location-details">
              <p><strong>📍 Full Address:</strong></p>
              <p style="font-size: 15px; color: #667eea;">${addressData.fullAddress}</p>
              <hr style="border: none; border-top: 1px solid #ddd; margin: 10px 0;">
              <p><strong>City:</strong> ${addressData.city}</p>
              <p><strong>State:</strong> ${addressData.state}</p>
              <p><strong>Country:</strong> ${addressData.country}</p>
              <p><strong>Postal Code:</strong> ${addressData.postcode}</p>
              <p><strong>Road:</strong> ${addressData.road}</p>
              <hr style="border: none; border-top: 1px solid #ddd; margin: 10px 0;">
              <p><strong>Latitude:</strong> ${latitude.toFixed(6)}</p>
              <p><strong>Longitude:</strong> ${longitude.toFixed(6)}</p>
              <p><strong>Timestamp:</strong> ${new Date(timestamp).toLocaleString()}</p>
            </div>
            <div class="message info">💾 Saving to repository...</div>
          `;
          
          // Send location data to server
          saveLocationToRepo(latitude, longitude, timestamp, addressData);
        },
        function(err) {
          btn.disabled = false;
          if (err.code === 1) {
            resultDiv.innerHTML = '<div class="message error">✗ Location permission denied. Please enable location access in your browser settings.</div>';
          } else if (err.code === 2) {
            resultDiv.innerHTML = '<div class="message error">✗ Location unavailable. Please check your device and try again.</div>';
          } else if (err.code === 3) {
            resultDiv.innerHTML = '<div class="message error">✗ Location request timed out. Please try again.</div>';
          } else {
            resultDiv.innerHTML = `<div class="message error">✗ Error: ${err.message}</div>`;
          }
        }
      );
    }

    // Save location
    function saveLocationToRepo(latitude, longitude, timestamp, addressData) {
      const locationData = {
        latitude: latitude,
        longitude: longitude,
        timestamp: timestamp,
        userAgent: navigator.userAgent,
        address: addressData.fullAddress,
        city: addressData.city,
        country: addressData.country
      };

      fetch(`${API_URL}/api/save-location`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(locationData)
      })
      .then(response => response.json())
      .then(data => {
        const resultDiv = document.getElementById("result");
        const btn = document.getElementById("locationBtn");
        btn.disabled = false;
        
        if (data.success) {
          resultDiv.innerHTML += '<div class="message success">✓ Location saved successfully!</div>';
          resultDiv.innerHTML += `<div class="message info">📝 Entry ID: ${data.data.id}</div>`;
        } else {
          resultDiv.innerHTML += `<div class="message error">✗ Error: ${data.message}</div>`;
        }
      })
      .catch(error => {
        const resultDiv = document.getElementById("result");
        const btn = document.getElementById("locationBtn");
        btn.disabled = false;
        resultDiv.innerHTML += `<div class="message error">✗ Connection error: ${error.message}</div>`;
      });
    }

    // View locations (requires authentication)
    function viewLocations() {
      const locationsList = document.getElementById("locationsList");

      if (!authToken) {
        locationsList.innerHTML = '<div class="message error">✗ Please login to view locations</div>';
        locationsList.style.display = 'block';
        return;
      }

      fetch(`${API_URL}/api/locations`, {
        headers: {
          'Authorization': `Bearer ${authToken}`
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.success === false && data.message.includes('token')) {
          // Token expired
          authToken = null;
          localStorage.removeItem('authToken');
          showLoginForLocations();
          return;
        }
        
        if (data.locations && data.locations.length > 0) {
          let html = '<h3>📍 Your Saved Locations (' + data.locations.length + ')</h3>';
          
          data.locations.forEach(loc => {
            html += `
              <div class="location-item">
                <p><strong>ID:</strong> ${loc.id}</p>
                <p><strong>📍 Address:</strong> ${loc.address || 'N/A'}</p>
                <p><strong>City:</strong> ${loc.city || 'N/A'} | <strong>Country:</strong> ${loc.country || 'N/A'}</p>
                <p><strong>Coordinates:</strong> ${loc.latitude.toFixed(6)}, ${loc.longitude.toFixed(6)}</p>
                <p><strong>Timestamp:</strong> ${new Date(loc.timestamp).toLocaleString()}</p>
                <p><strong>Saved At:</strong> ${new Date(loc.savedAt).toLocaleString()}</p>
              </div>
            `;
          });
          
          html += `<button class="btn-secondary" onclick="logout()">Logout</button>`;
          
          locationsList.innerHTML = html;
          locationsList.style.display = 'block';
        } else {
          locationsList.innerHTML = '<div class="message info">No locations saved yet. Click "Check My Offers" to save your location.</div>';
          locationsList.innerHTML += `<button class="btn-secondary" onclick="logout()">Logout</button>`;
          locationsList.style.display = 'block';
        }
      })
      .catch(error => {
        console.error('Error fetching locations:', error);
        locationsList.innerHTML = `<div class="message error">✗ Error loading locations: ${error.message}</div>`;
        locationsList.innerHTML += `<button class="btn-secondary" onclick="logout()">Logout</button>`;
        locationsList.style.display = 'block';
      });
    }
  </script>
</body>
</html>
